<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="favicon-tren-691C32-32.png" sizes="32x32">
  <title>Timeline ATTRAPI</title>

  <!-- TimelineJS -->
  <link title="timeline-styles" rel="stylesheet"
        href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --color-institucional:#691c32;
      --color-institucional-sec:#96606f;
      --color-link:#96606f;
      --franja-guinda:70px;

      --t-line: rgba(255,255,255,.22);
      --t-line-strong: rgba(255,255,255,.45);
      --t-bg: rgba(255,255,255,.05);
      --t-bg-2: rgba(0,0,0,.12);
      --t-bg-3: rgba(255,255,255,.03);
      --t-txt:#fff;
      --t-txt-2: rgba(255,255,255,.88);
      --t-radius:14px;

      --card-grad: linear-gradient(135deg, rgba(105,28,50,.92) 0%, rgba(139,42,67,.78) 55%, rgba(84,20,38,.92) 100%);
      --card-border: rgba(255,255,255,.18);
      --txt-soft: rgba(255,255,255,.86);
      --txt-softer: rgba(255,255,255,.72);
      --line-soft: rgba(255,255,255,.16);
      --line-strong: rgba(255,255,255,.28);
    }

    /* Cuadros de eventos en el timenav */
    .tl-timemarker-content-container,
    .tl-timemarker-content-container-long,
    .tl-timemarker-content-container-small{
      background-color: var(--color-institucional);
      color:#fff; border-radius:4px;
      border:1px solid rgba(0,0,0,0.15);
    }
    .tl-timemarker.tl-timemarker-with-end .tl-timemarker-content-container,
    .tl-timemarker.tl-timemarker-with-end .tl-timemarker-content-container-long,
    .tl-timemarker.tl-timemarker-with-end .tl-timemarker-content-container-small{
      background-color: var(--color-institucional-sec);
    }

    /* Links */
    .tl-text-content{ margin-top: 60px; }
    .tl-slide .tl-text-content a{
      color: var(--color-link); text-decoration:none; font-weight:600;
      border-bottom:1px dashed var(--color-link);
    }
    .tl-slide .tl-text-content a:hover{ text-decoration:underline; }

    /* Acordeones */
    .tl-slide .tl-text-content .accordion{ margin:.4em 0 .6em; }
    .tl-slide .tl-text-content .accordion-summary{
      cursor:pointer; font-weight:600; padding:.25em .6em; border-radius:4px;
      display:inline-block; background: var(--color-institucional-sec); color:#fff; user-select:none;
    }
    .tl-slide .tl-text-content .accordion-body{
      max-height:0; overflow:hidden; opacity:0; transform: translateY(-4px);
      transition: max-height .35s ease, opacity .35s ease, transform .35s ease;
      margin-top:.25em;
    }
    .tl-slide .tl-text-content .accordion.is-open .accordion-body{
      max-height:500px; opacity:1; transform: translateY(0);
    }
    .tl-slide .tl-text-content .accordion-body ul{ margin:.3em 0 0 1.2em; padding-left:0; }

    /* Base */
    html, body{ background:#691C32; margin:0; padding:0; }
    body::after{
      content:""; position:fixed; left:0; right:0; bottom:0;
      height: var(--franja-guinda); background:#691C32;
      pointer-events:none; z-index:-1;
    }
    .tl-timeline h2.tl-headline-title{ white-space:nowrap; }

    .tl-media .tl-caption{
      position:absolute; top:0; left:0; right:0; margin:0;
      padding:12px 16px; background: rgba(105,28,50,.85);
      color:#fff; font-weight:700; text-transform:uppercase; z-index:20;
    }
    .tl-media .tl-media-content{ padding-top:52px; }

    .titulo-foto{
      max-width:100%; padding:10px 14px; margin:10px 0 14px; font-size:large;
      border-radius:12px; border:1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.12); color:#fff; font-weight:900;
      letter-spacing:.8px; text-transform:uppercase; line-height:1.1;
    }

    #timeline-embed .tl-media,
    #timeline-embed .tl-media-content-container,
    #timeline-embed .tl-media-content,
    #timeline-embed .tl-media-wrapper,
    #timeline-embed .tl-slide-content-container{ background:#691C32 !important; }
    #timeline-embed .tl-media .tl-caption{
      width:600px !important; max-width:calc(100% - 24px) !important; margin-top:8px;
    }

    #timeline-embed .tl-timemarker-media-container [class^="tl-icon-"],
    #timeline-embed .tl-timemarker-media-container [class*=" tl-icon-"]{ display:none !important; }

    /* Role cards */
    #timeline-embed .tl-slide .tl-text-content .role-card{
      margin:10px 0; padding:12px 14px; border-radius:14px;
      background: var(--card-grad); border:1px solid var(--card-border);
      border-left:4px solid rgba(255,255,255,.26);
      box-shadow: 0 18px 38px rgba(0,0,0,.28);
    }
    #timeline-embed .tl-slide .tl-text-content .role-title{
      color: var(--txt-softer); font-size:12px; font-weight:900;
      letter-spacing:.9px; text-transform:uppercase; margin-bottom:6px;
    }
    #timeline-embed .tl-slide .tl-text-content .role-name{
      color: var(--txt-soft); font-size:16px; font-weight:900; line-height:1.15;
    }

    #timeline-embed .tl-slide .tl-text-content ul{ list-style:none; padding-left:0; margin-left:0; }

    /* Resident cards */
    #timeline-embed .tl-slide .tl-text-content .resident-card{
      margin:14px 0; padding:10px; border-radius:16px;
      background: linear-gradient(135deg, rgba(105,28,50,.55) 0%, rgba(0,0,0,.14) 55%, rgba(105,28,50,.40) 100%);
      border:1px solid var(--card-border);
      box-shadow: 0 18px 40px rgba(0,0,0,.30);
    }
    #timeline-embed .tl-slide .tl-text-content .resident-card table{
      color: var(--txt-soft); font-size:12px; width:100%;
    }
    #timeline-embed .tl-slide .tl-text-content .resident-card td{
      border-top:1px solid var(--line-soft); padding:6px 4px; line-height:1.25;
      color: rgba(255,255,255,.82);
    }
    #timeline-embed .tl-slide .tl-text-content .resident-card tr:first-child td,
    #timeline-embed .tl-slide .tl-text-content .resident-card tr:nth-child(2) td{ border-top:0; }
    #timeline-embed .tl-slide .tl-text-content .resident-card tr:first-child strong{
      display:inline-block; padding:8px 10px; border-radius:12px;
      background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.90); letter-spacing:.6px;
    }
    #timeline-embed .tl-slide .tl-text-content .resident-card img{
      border:2px solid rgba(255,255,255,.22);
      box-shadow: 0 14px 26px rgba(0,0,0,.35);
      object-fit: cover; object-position: 50% 25%;
      width:140px; height:140px; border-radius:50%;
    }

    /* Dividers */
    #timeline-embed .tl-slide .tl-text-content .divider{
      height:1px; margin:14px 0;
      background: linear-gradient(90deg, rgba(255,255,255,0), var(--line-strong), rgba(255,255,255,0));
    }

    /* Contenedor timeline */
    .timeline-wrap{
      width:100%; height: calc(100vh - var(--franja-guinda));
      min-height:650px; overflow:hidden; position:relative;
      --toggle-bottom:130px; z-index:1;
    }
    .timeline-wrap.is-prehide #timeline-embed{ opacity:0; }
    #timeline-embed{ width:100%; height:100%; transition: opacity .12s ease; }
    #timeline-embed .tl-timeline,
    #timeline-embed .tl-storyslider,
    #timeline-embed .tl-storyslider .tl-slider-container{ background:#691C32 !important; }

    .timeline-wrap.is-collapsed #timeline-embed .tl-timenav,
    .timeline-wrap.is-collapsed #timeline-embed .tl-timenav-wrapper,
    .timeline-wrap.is-collapsed #timeline-embed .tl-timenav-container,
    .timeline-wrap.is-collapsed #timeline-embed .tl-menubar{
      display:none !important; height:0 !important; min-height:0 !important;
      margin:0 !important; padding:0 !important; border:0 !important;
    }
    .timeline-wrap.is-collapsed #timeline-embed .tl-storyslider{
      bottom:0 !important; height:100% !important;
    }

    .timeline-toggle{
      position:absolute; right:14px; bottom: var(--toggle-bottom); z-index:99999;
      background: rgba(0,0,0,.18); border:1px solid rgba(255,255,255,.45);
      color:#fff; border-radius:10px; padding:8px 12px;
      font-size:12px; font-weight:900; letter-spacing:.8px;
      text-transform:uppercase; cursor:pointer; backdrop-filter: blur(4px);
    }
    .timeline-toggle:hover{ background: rgba(0,0,0,.28); }

    #timeline-embed .tl-credit,
    #timeline-embed .tl-attribution,
    .tl-credit, .tl-attribution{ display:none !important; }

    .timeline-wrap.is-prehide{ --toggle-bottom:10px; }
    .timeline-wrap.is-prehide .timeline-toggle{
      opacity:0 !important; pointer-events:none !important;
      transform: translateY(10px);
      transition: opacity .15s ease, transform .15s ease;
    }

    .tl-headline, .tl-headline-date{ display:none; }
    .tl-text-content-container{ margin-top:-30px; }

    /* Tabla contrato */
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato{
      width:100% !important; border-collapse: collapse !important;
      table-layout: fixed; color: var(--t-txt);
      border:1px solid var(--t-line-strong) !important;
      border-radius: var(--t-radius); overflow:visible;
      background: var(--t-bg);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      margin-bottom:16px;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato th,
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato td{
      padding:16px 14px; border-bottom:1px solid var(--t-line) !important;
      border-right:1px solid var(--t-line) !important;
      vertical-align:middle; line-height:1.25;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato th:last-child,
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato td:last-child{ border-right:none !important; }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato tr:last-child th,
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato tr:last-child td{ border-bottom:none !important; }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato > tbody > tr > th{
      width:34%; text-align:left; font-weight:900;
      background: linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.06));
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato td.valor{
      color: var(--t-txt-2); font-weight:700;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato .placeholder{
      display:inline-block; padding:8px 10px; border-radius:10px;
      background: rgba(255,255,255,.07); border:1px dashed rgba(255,255,255,.28);
      color: rgba(255,255,255,.82);
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato td[colspan="2"]{
      padding:0 !important; border-right:none !important;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-contrato td[colspan="2"] > .tabla-contrato{
      border:none !important; border-radius:0 !important; box-shadow:none !important; background:transparent !important;
      margin-bottom:0;
    }

    #timeline-embed .tl-slide .tl-text-content .tabla-avance{ table-layout: fixed; }
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:first-child th{
      background: var(--t-bg-2); font-weight:900; letter-spacing:.4px; padding:12px 10px;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:first-child th:nth-child(1),
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:first-child th:nth-child(2){
      border-right:2px solid var(--t-line-strong) !important;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:nth-child(2) th{
      background: rgba(255,255,255,.04); font-weight:800; font-size:13px;
      padding:10px 6px; white-space: normal !important;
      overflow-wrap:anywhere; word-break:break-word; hyphens:auto;
      line-height:1.1; text-align:center;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-avance td{
      background: var(--t-bg-3); padding:10px 6px; text-align:center;
    }
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:nth-child(2) th:nth-child(2),
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:nth-child(3) td:nth-child(2),
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:nth-child(2) th:nth-child(4),
    #timeline-embed .tl-slide .tl-text-content .tabla-avance tr:nth-child(3) td:nth-child(4){
      border-right:2px solid var(--t-line-strong) !important;
    }

    /* Botón popup */
    .btn-link{
      background: linear-gradient(135deg, #691c32 0%, #8b2a43 55%, #541426 100%);
      color:#fff; border:1px solid rgba(255,255,255,.18);
      padding:.45rem .75rem; border-radius:.75rem; cursor:pointer; font:inherit;
      font-weight:600; box-shadow:0 10px 22px rgba(105,28,50,.22);
      transition: transform .12s ease, filter .12s ease;
    }
    .btn-link:hover{ filter: brightness(1.05); transform: translateY(-1px); }
    .pop-wrap{ position:relative; }

    /* Popup */
    #timeline-embed .popbox{
      position:static !important; margin-top:10px !important;
      width:100% !important; max-width:100% !important;
      max-height:320px !important; z-index:1 !important;
      background: linear-gradient(135deg, #691c32 0%, #8b2a43 55%, #541426 100%);
      border:1px solid rgba(255,255,255,.18); border-radius:14px;
      padding:10px; color:#fff;
    }
    #timeline-embed .popbox.js-popbox{
      max-height:0 !important; opacity:0; transform: translateY(-6px);
      overflow:hidden !important;
      transition: max-height .65s ease, opacity .65s ease, transform .65s ease;
    }
    #timeline-embed .popbox.js-popbox.is-open{
      max-height:320px !important; opacity:1; transform: translateY(0);
      overflow-y:auto !important;
    }
    #timeline-embed .popbox .poplist{ margin:0; padding:6px; list-style:none; }
    #timeline-embed .popbox .poplist > li{
      padding:10px 10px 8px; border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: #dadbdd; margin:8px 0;
      font-weight:900; letter-spacing:.5px; text-transform:uppercase;
      font-size:12px; line-height:1.15; color:#531b2a;
    }
    #timeline-embed .popbox .popsub{ margin:8px 0 0; padding:0; list-style:none; }
    #timeline-embed .popbox .popsub > li{
      position:relative; padding:10px 12px 10px 18px; border-radius:12px;
      margin:8px 0 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.03)),
        linear-gradient(135deg, rgba(105,28,50,.92), rgba(139,42,67,.72), rgba(84,20,38,.78));
      border:1px solid rgba(255,255,255,.18);
      font-size:13px; font-weight:700; line-height:1.35;
      overflow-wrap:anywhere; word-break:break-word; color: var(--txt-soft);
      text-transform:none; letter-spacing:0;
    }
    #timeline-embed .popbox .popsub > li::before{
      content:""; position:absolute; left:8px; top:8px; bottom:8px;
      width:4px; border-radius:999px;
      background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.12));
    }
    #timeline-embed .popbox .popsub > li a{
      color: var(--txt-soft); text-decoration:none;
      border-bottom:1px dashed rgba(255,255,255,.38); font-weight:800;
      word-break:break-all !important;
    }

    /* Status de carga */
    #loading-status{
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      color:#fff; font-size:16px; font-weight:600; letter-spacing:.5px;
      text-align:center; z-index:99998; padding:20px;
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    }
    #loading-status.error{ color:#ffd4cc; max-width:500px; }
    #loading-status .spin{
      display:inline-block; width:20px; height:20px;
      border:3px solid rgba(255,255,255,.2); border-top-color:#fff;
      border-radius:50%; animation: spin 1s linear infinite;
      margin-right:8px; vertical-align:middle;
    }
    @keyframes spin{ to { transform: rotate(360deg); } }
    #loading-status code{
      background: rgba(0,0,0,.25); padding:2px 6px; border-radius:4px;
      font-family: monospace; font-size:12px;
    }
  </style>
</head>

<body>
  <div id="loading-status"><span class="spin"></span>Cargando datos del Sheet…</div>

  <div id="timeline-wrap" class="timeline-wrap is-prehide" style="display:none">
    <div id="timeline-embed"></div>
    <button class="timeline-toggle" id="toggle-timeline" type="button" aria-expanded="true">
      Mostrar Cronología
    </button>
  </div>

  <!-- ======================================================================
       CONFIGURACIÓN: ID del libro publicado y gid de cada hoja.
       Cuando crees el Sheet, publícalo (Archivo → Compartir → Publicar en
       la web) y sustituye los gid de abajo por los reales de cada pestaña.
       ====================================================================== -->
  <script>
    const SHEET_PUB = "2PACX-1vThl1JtFhTgef_fqrUYbLFmXjYP-cCd3gpxwcx6eduzP5Mi6gMKVkX9ySWZCFb1i0fBsrOfgBtcQNAr";

    const GIDS = {
      portada:    "0",
      eventos:    "1",
      contratos:  "2",
      contactos:  "3",
      residentes: "4"
    };

    const csvUrl = gid =>
      `https://docs.google.com/spreadsheets/d/e/${SHEET_PUB}/pub?gid=${gid}&single=true&output=csv&t=${Date.now()}`;
  </script>

  <!-- ======================================================================
       LECTURA DE CSVs Y CONSTRUCCIÓN DE EVENTOS
       ====================================================================== -->
  <script>
    const esc = s => (s==null?'':String(s))
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');

    const raw = s => (s==null?'':String(s).trim());
    const has = s => raw(s).length > 0;

    function parseFecha(str){
      const s = raw(str); if (!s) return null;
      let m = s.match(/^(\d{4})[-/](\d{1,2})(?:[-/](\d{1,2}))?$/);
      if (m) return { year:+m[1], month:+m[2]||null, day:+m[3]||null };
      m = s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
      if (m) return { year:+m[3], month:+m[2], day:+m[1] };
      m = s.match(/^(\d{4})$/);
      if (m) return { year:+m[1] };
      return null;
    }

    function loadCSV(url){
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          skipEmptyLines: 'greedy',
          transformHeader: h => raw(h).toLowerCase(),
          complete: r => resolve(r.data || []),
          error: err => reject(err)
        });
      });
    }

    function renderResidentCard(r){
      const foto = raw(r.foto);
      const nombre = esc(r.nombre);
      const tramo = esc(r.tramo);
      const contratos = esc(r.contratos);
      const empresas = esc(r.empresas);
      return `
        <div class="resident-card">
          <table>
            <tr>
              <td colspan="2" style="text-align:center">
                <strong>${tramo||'&nbsp;'}</strong>
              </td>
            </tr>
            <tr>
              <td style="width:160px;text-align:center">
                ${foto ? `<img src="${esc(foto)}" alt="${nombre}">` : ''}
              </td>
              <td style="border-left:2px solid azure;padding-left:10px">
                <strong>${nombre}</strong>
                ${contratos ? `<div style="margin-top:6px"><small>${contratos}</small></div>` : ''}
                ${empresas  ? `<div style="margin-top:4px"><small>${empresas}</small></div>`  : ''}
              </td>
            </tr>
          </table>
        </div>`;
    }

    function renderContratoTable(c, contactosDelEvento){
      const popupId = `pop_${Math.random().toString(36).slice(2,9)}`;
      const contactosDeEsteContrato = (contactosDelEvento || []).filter(ct =>
        !has(ct.contrato_id) || raw(ct.contrato_id) === raw(c.id)
      );
      const tieneContactos = contactosDeEsteContrato.length > 0;

      const btn = tieneContactos ? `
        <div class="pop-wrap">
          <button class="btn-link js-popbtn" type="button"
                  aria-expanded="false" aria-controls="${popupId}">
            ${esc(c.residente) || 'Ver contactos'} ▾
          </button>
          <div id="${popupId}" class="popbox js-popbox" hidden>
            <ul class="poplist">
              ${renderContactosAgrupados(contactosDeEsteContrato)}
            </ul>
          </div>
        </div>
      ` : `<span class="placeholder">${esc(c.residente) || '—'}</span>`;

      const tramoClass = raw(c.tramo) ? ` tramo-${esc(c.tramo).replace(/\s+/g,'-')}` : '';

      return `
      <table class="tabla-contrato${tramoClass}">
        <tr>
          <th>Contrato</th>
          <td class="valor">${esc(c.contrato) || '<span class="placeholder">—</span>'}</td>
        </tr>
        <tr>
          <th>Residente</th>
          <td class="valor">${btn}</td>
        </tr>
        <tr>
          <th>Supervisión</th>
          <td class="valor">${esc(c.supervision) || '<span class="placeholder">—</span>'}</td>
        </tr>
        <tr>
          <td colspan="2">
            <table class="tabla-contrato tabla-avance">
              <tr>
                <th colspan="2">Plazo</th>
                <th colspan="2">Importe</th>
                <th colspan="3">Avance</th>
              </tr>
              <tr>
                <th>Inicio</th><th>Fin</th>
                <th>Inicial</th><th>Ajustado</th>
                <th>Programado</th><th>Real</th><th>Físico</th>
              </tr>
              <tr>
                <td>${esc(c.plazo_inicio) || '—'}</td>
                <td>${esc(c.plazo_fin) || '—'}</td>
                <td>${esc(c.importe_inicial) || '—'}</td>
                <td>${esc(c.importe_ajustado) || '—'}</td>
                <td>${esc(c.avance_prog) || '—'}</td>
                <td>${esc(c.avance_real) || '—'}</td>
                <td>${esc(c.avance_fisico) || '—'}</td>
              </tr>
            </table>
          </td>
        </tr>
      </table>`;
    }

    function renderContactosAgrupados(contactos){
      const porCargo = {};
      contactos.forEach(c => {
        const k = raw(c.cargo) || 'Contacto';
        (porCargo[k] = porCargo[k] || []).push(c);
      });
      return Object.entries(porCargo).map(([cargo, list]) => {
        const items = list.map(c => {
          const linea = [];
          if (has(c.empresa))  linea.push(`<strong>${esc(c.empresa)}</strong>`);
          if (has(c.nombre))   linea.push(esc(c.nombre));
          if (has(c.correo))   linea.push(`<a href="mailto:${esc(c.correo)}">${esc(c.correo)}</a>`);
          if (has(c.telefono)) linea.push(esc(c.telefono));
          return `<li>${linea.join('<br>')}</li>`;
        }).join('');
        return `<li>${esc(cargo)}<ul class="popsub">${items}</ul></li>`;
      }).join('');
    }

    function renderRoleCards(roles){
      return roles.map(r => `
        <div class="role-card">
          <div class="role-title">${esc(r.cargo)}</div>
          <div class="role-name">${esc(r.nombre)}</div>
        </div>`).join('');
    }

    function renderEventoHTML(ev, contratosDelEvento, contactosDelEvento, rolesDelEvento){
      const partes = [];
      if (has(ev.titulo)) partes.push(`<div class="titulo-foto">${esc(ev.titulo)}</div>`);
      if (has(ev.texto))  partes.push(`<div>${ev.texto}</div>`);
      if (rolesDelEvento && rolesDelEvento.length){
        partes.push(renderRoleCards(rolesDelEvento));
      }
      if (contratosDelEvento.length){
        partes.push('<div class="divider"></div>');
        contratosDelEvento.forEach(c => {
          partes.push(renderContratoTable(c, contactosDelEvento));
        });
      }
      return partes.join('\n');
    }

    function renderPortadaHTML(portada, residentes){
      const tarjetas = residentes.map(renderResidentCard).join('');
      const subtitulo = has(portada.subtitle)
        ? `<div style="font-size:16px;opacity:.9;margin-bottom:12px">${esc(portada.subtitle)}</div>` : '';
      return `
        ${subtitulo}
        ${has(portada.descripcion) ? `<div style="margin-bottom:14px">${portada.descripcion}</div>` : ''}
        ${tarjetas.length ? '<div class="divider"></div>' + tarjetas : ''}
      `;
    }

    function buildTimelineData(portadaRows, eventos, contratos, contactos, residentes){
      const portada = {};
      portadaRows.forEach(r => {
        if (has(r.clave)) portada[raw(r.clave).toLowerCase()] = raw(r.valor);
      });

      const contratosPorEvento = {};
      contratos.forEach(c => {
        const k = raw(c.evento_id); if (!k) return;
        (contratosPorEvento[k] = contratosPorEvento[k] || []).push(c);
      });
      const contactosPorEvento = {};
      contactos.forEach(c => {
        const k = raw(c.evento_id); if (!k) return;
        (contactosPorEvento[k] = contactosPorEvento[k] || []).push(c);
      });

      const title = {
        text: {
          headline: esc(portada.title || 'Línea del Tiempo'),
          text: renderPortadaHTML(portada, residentes)
        }
      };
      if (has(portada.imagen)){
        title.media = {
          url: raw(portada.imagen),
          caption: raw(portada.caption) || '',
          credit: raw(portada.credito) || ''
        };
      }

      const events = eventos
        .filter(ev => has(ev.fecha) && has(ev.titulo))
        .map(ev => {
          const f = parseFecha(ev.fecha); if (!f) return null;
          const id = raw(ev.id);
          const cs = contratosPorEvento[id] || [];
          const cts = contactosPorEvento[id] || [];

          const slide = {
            start_date: { year: f.year, ...(f.month?{month:f.month}:{}), ...(f.day?{day:f.day}:{}) },
            text: {
              headline: esc(ev.titulo),
              text: renderEventoHTML(ev, cs, cts, [])
            }
          };
          if (has(ev.imagen)){
            slide.media = {
              url: raw(ev.imagen),
              caption: raw(ev.caption) || '',
              credit: raw(ev.credito) || ''
            };
          }
          if (has(ev.grupo)) slide.group = raw(ev.grupo);
          return slide;
        })
        .filter(Boolean);

      return { title, events };
    }

    async function boot(){
      const status = document.getElementById('loading-status');
      try {
        const [portada, eventos, contratos, contactos, residentes] = await Promise.all([
          loadCSV(csvUrl(GIDS.portada)),
          loadCSV(csvUrl(GIDS.eventos)),
          loadCSV(csvUrl(GIDS.contratos)),
          loadCSV(csvUrl(GIDS.contactos)),
          loadCSV(csvUrl(GIDS.residentes))
        ]);

        const data = buildTimelineData(portada, eventos, contratos, contactos, residentes);

        if (!data.events.length){
          throw new Error('No hay eventos válidos en la hoja "eventos". Revisa que tengan fecha y título.');
        }

        status.style.display = 'none';
        document.getElementById('timeline-wrap').style.display = '';

        window.timeline = new TL.Timeline('timeline-embed', data, {
          language: 'es',
          initial_zoom: 0,
          font: 'Default',
          start_at_slide: 0
        });

        initToggle();
      } catch (err){
        console.error(err);
        status.classList.add('error');
        status.innerHTML = `
          <strong>No se pudieron cargar los datos.</strong><br>
          ${esc(err.message || err)}<br><br>
          <small>Verifica que el Sheet esté <b>Publicado en la web</b>
          y que los <code>gid</code> de cada hoja coincidan con los del script.</small>`;
      }
    }

    document.addEventListener('DOMContentLoaded', boot);
  </script>

  <!-- ======================================================================
       COMPORTAMIENTO: acordeón, toggle, popups
       ====================================================================== -->
  <script>
    /* Acordeón */
    document.addEventListener('click', function (e) {
      const summary = e.target.closest('.accordion-summary');
      if (!summary || e.target.tagName === 'A') return;
      const accordion = summary.closest('.accordion');
      if (accordion) accordion.classList.toggle('is-open');
    });

    function initToggle(){
      const wrap = document.getElementById('timeline-wrap');
      const btn  = document.getElementById('toggle-timeline');

      function refreshTimeline(){
        requestAnimationFrame(() => {
          void wrap.offsetHeight;
          window.timeline?.updateDisplay?.();
          setTimeout(() => window.timeline?.updateDisplay?.(), 60);
          setTimeout(() => window.timeline?.updateDisplay?.(), 220);
        });
      }
      function updateOffset(){
        if (wrap.classList.contains('is-collapsed')) {
          wrap.style.setProperty('--toggle-bottom', '10px');
          return true;
        }
        const nav = document.querySelector('#timeline-embed .tl-timenav');
        if (!nav) return false;
        const navH = Math.ceil(nav.getBoundingClientRect().height);
        if (navH <= 0) return false;
        wrap.style.setProperty('--toggle-bottom', (navH + 10) + 'px');
        return true;
      }

      (function startCollapsed(){
        let tries = 0;
        const tick = () => {
          tries++;
          const nav = document.querySelector('#timeline-embed .tl-timenav');
          const ok = nav && nav.getBoundingClientRect().height > 0;
          if (ok) {
            wrap.classList.add('is-collapsed');
            wrap.classList.remove('is-prehide');
            btn.textContent = 'Mostrar Cronología';
            btn.setAttribute('aria-expanded', 'false');
            wrap.style.setProperty('--toggle-bottom', '10px');
            refreshTimeline();
            return;
          }
          if (tries >= 240){
            wrap.classList.remove('is-prehide'); refreshTimeline(); return;
          }
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      })();

      const embed = document.getElementById('timeline-embed');
      new MutationObserver(() => updateOffset()).observe(embed, { childList:true, subtree:true });

      btn.addEventListener('click', () => {
        const willCollapse = !wrap.classList.contains('is-collapsed');
        wrap.classList.toggle('is-collapsed', willCollapse);
        if (willCollapse){
          btn.textContent = 'Mostrar Cronología';
          btn.setAttribute('aria-expanded', 'false');
          wrap.style.setProperty('--toggle-bottom', '10px');
        } else {
          btn.textContent = 'OCULTAR';
          btn.setAttribute('aria-expanded', 'true');
          updateOffset();
        }
        refreshTimeline();
      });

      window.addEventListener('resize', () => { updateOffset(); refreshTimeline(); });
    }

    /* Popups */
    (function(){
      const DUR = 650;
      function closeBox(box){
        if (!box) return;
        box.classList.remove('is-open');
        if (box._hideTimer) clearTimeout(box._hideTimer);
        box._hideTimer = setTimeout(() => { box.hidden = true; }, DUR);
      }
      function openBox(box){
        if (!box) return;
        if (box._hideTimer) clearTimeout(box._hideTimer);
        box.hidden = false;
        requestAnimationFrame(() => box.classList.add('is-open'));
      }
      function closeAll(except){
        document.querySelectorAll('#timeline-embed .js-popbox').forEach(b => { if (b!==except) closeBox(b); });
        document.querySelectorAll('#timeline-embed .js-popbtn').forEach(b => b.setAttribute('aria-expanded','false'));
        if (except){
          const wrap = except.closest('.pop-wrap');
          const btn = wrap?.querySelector('.js-popbtn');
          if (btn) btn.setAttribute('aria-expanded','true');
        }
      }
      document.addEventListener('click', function(e){
        const btn = e.target.closest('#timeline-embed .js-popbtn');
        const inside = e.target.closest('#timeline-embed .js-popbox');
        if (inside) return;
        if (btn){
          const wrap = btn.closest('.pop-wrap');
          const box = wrap?.querySelector('.js-popbox');
          if (!box) return;
          const isOpen = !box.hidden && box.classList.contains('is-open');
          if (isOpen){ btn.setAttribute('aria-expanded','false'); closeBox(box); }
          else { closeAll(box); btn.setAttribute('aria-expanded','true'); openBox(box); }
          e.preventDefault(); e.stopPropagation(); return;
        }
        closeAll();
      }, true);
      document.addEventListener('keydown', e => { if (e.key==='Escape') closeAll(); });
    })();
  </script>
